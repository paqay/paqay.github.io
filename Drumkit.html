<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="media/flakturm grafik 2.ico" />
  <meta property="og:image" content="https://paqay.cc/media/og_cover.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
  <title>paqay's "1020_PACK" Drumkit 💹</title>

  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
  
    html, body { 
      height: 100%; 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden; 
      background: #000; 
    }
  
    .background-video {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; 
      filter: blur(10px) brightness(0.8);
    }

    .back-button {
      position: absolute;
      top: 30px;
      left: 30px;
      z-index: 20;
      color: white;
      text-decoration: none;
      mix-blend-mode: difference;
      opacity: 0;
      animation: fadeIn 1.5s ease-in-out forwards;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .back-button:hover {
      transform: translateX(-5px);
      opacity: 1 !important;
    }
  
    .content {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; text-align: center;
      position: relative; z-index: 10;
    }
  
    .logo {
      width: 70%; max-width: 600px; opacity: 0;
      animation: fadeIn 1.5s ease-in-out forwards;
      mix-blend-mode: difference;
      filter: drop-shadow(0 0 20px white);
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    
    .logo:hover {
      transform: scale(1.05);
    }
  
    .status-text {
      font-family: 'Inter', sans-serif;
      margin-top: 20px; 
      color: white; 
      text-transform: uppercase;
      letter-spacing: 2px; 
      font-size: 12px; 
      font-weight: 500; 
      opacity: 0.7;
      animation: fadeIn 2s ease-in-out 0.5s forwards;
    }
  
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>

<body>
  <a href="javascript:history.back()" class="back-button">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
  </a>

  <video class="background-video" autoplay muted loop playsinline>
    <source src="media/videos/1020 footage.mp4" type="video/mp4" />
  </video>

  <div class="content">
    <a id="downloadLink">
      <img src="media/paqay_tag inverted.svg" alt="paqay Logo" class="logo" />
    </a>
    <p class="status-text">Download startet automatisch...</p>
  </div>

  <script>
    const fileName = "- ! @paqay 1020_PACK.zip"; 

    window.onload = () => {
      const mainLink = document.getElementById('downloadLink');
      mainLink.href = fileName;
      mainLink.download = fileName;

      setTimeout(() => {
        const link = document.createElement('a');
        link.href = fileName;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }, 1500);
    };
  </script>
</body>
</html>
