<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAKTAPE</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E09V5RMZHJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E09V5RMZHJ');
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
            line-height: 1;
            position: relative;
        }

        /* PARALLAX TOWER BACKGROUND */
        .parallax-tower {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 900px;
            height: 200%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.08;
        }

        .parallax-tower img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
        }

        /* Typography */
        h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 0.85;
            text-transform: uppercase;
            word-break: break-word;
            position: relative;
            z-index: 2;
        }

        h2 {
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(2rem, 8vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            line-height: 0.9;
            position: relative;
            z-index: 2;
        }

        p, span {
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 2;
        }

        /* HERO */
        .hero {
            width: 100%;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr auto;
            align-items: center;
            justify-items: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
            gap: 3rem;
            position: relative;
            z-index: 1;
        }

        .hero-title {
            font-size: clamp(3rem, 14vw, 10rem);
            text-align: center;
            animation: scaleInTitle 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        .tower-hero {
            width: 100%;
            max-width: 500px;
            height: auto;
            aspect-ratio: 1;
            object-fit: contain;
            animation: rotateInTower 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.1));
            position: relative;
            z-index: 10;
        }

        .hero-subtitle {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.7;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        @keyframes scaleInTitle {
            from {
                opacity: 0;
                transform: scale(0.85) rotateX(20deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateX(0);
            }
        }

        @keyframes rotateInTower {
            from {
                opacity: 0;
                transform: scale(0.8) rotateY(-30deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Sections */
        section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
            z-index: 1;
        }

        section.dark {
            background-color: #000000;
            color: #ffffff;
        }

        section.light {
            background-color: #ffffff;
        }

        section.gray {
            background-color: #f5f5f5;
        }

        /* Tower Section */
        .tower-section {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 3rem;
            text-align: center;
            max-width: 800px;
        }

        .tower-section h2 {
            animation: fadeInOnScroll 1s ease-out forwards;
            opacity: 0;
        }

        /* Track Grid */
        .tracks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 900px;
            position: relative;
            z-index: 2;
        }

        .track-visual {
            aspect-ratio: 1;
            background: #000000;
            border: 3px solid #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            animation: scaleInGrid 0.8s ease-out forwards;
            opacity: 0;
        }

        .track-visual:nth-child(1) { animation-delay: 0.1s; }
        .track-visual:nth-child(2) { animation-delay: 0.2s; }
        .track-visual:nth-child(3) { animation-delay: 0.3s; }
        .track-visual:nth-child(4) { animation-delay: 0.4s; }
        .track-visual:nth-child(5) { animation-delay: 0.5s; }
        .track-visual:nth-child(6) { animation-delay: 0.6s; }

        @keyframes scaleInGrid {
            from {
                opacity: 0;
                transform: scale(0.6) rotateZ(-5deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateZ(0);
            }
        }

        .gray .track-visual {
            background: #ffffff;
            color: #000000;
        }

        .track-visual:hover {
            transform: scale(1.1) rotateZ(2deg);
            background: #ffffff;
            color: #000000;
        }

        .gray .track-visual:hover {
            background: #000000;
            color: #ffffff;
        }

        .track-number {
            font-size: 2rem;
            font-weight: 900;
            font-family: 'Unbounded', sans-serif;
        }

        .track-title {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .track-time {
            font-size: 0.7rem;
            opacity: 0.7;
            font-weight: 700;
        }

        /* Streaming Grid */
        .streaming-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.2rem;
            width: 100%;
            max-width: 800px;
            position: relative;
            z-index: 2;
        }

        .stream-btn {
            aspect-ratio: 1;
            border: 3px solid #000000;
            background: #ffffff;
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.75rem, 2vw, 0.95rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            animation: slideInBtn 0.6s ease-out forwards;
            opacity: 0;
        }

        .stream-btn:nth-child(1) { animation-delay: 0.1s; }
        .stream-btn:nth-child(2) { animation-delay: 0.2s; }
        .stream-btn:nth-child(3) { animation-delay: 0.3s; }
        .stream-btn:nth-child(4) { animation-delay: 0.4s; }
        .stream-btn:nth-child(5) { animation-delay: 0.5s; }
        .stream-btn:nth-child(6) { animation-delay: 0.6s; }

        @keyframes slideInBtn {
            from {
                opacity: 0;
                transform: translateY(30px) rotateX(20deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        .dark .stream-btn {
            border-color: #ffffff;
            background: transparent;
            color: #ffffff;
        }

        .stream-btn:hover {
            background: #000000;
            color: #ffffff;
            transform: scale(1.08) translateY(-5px);
        }

        .dark .stream-btn:hover {
            background: #ffffff;
            color: #000000;
        }

        /* Footer */
        footer {
            width: 100%;
            background: #000000;
            color: #ffffff;
            padding: 4rem 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            min-height: 50vh;
            position: relative;
            z-index: 1;
        }

        footer h2 {
            color: #ffffff;
            font-size: clamp(2rem, 10vw, 5rem);
        }

        footer a {
            color: #ffffff;
            margin: 0 1rem;
            opacity: 0.8;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        footer a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        @keyframes fadeInOnScroll {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: clamp(2.5rem, 12vw, 5rem);
            }

            h2 {
                font-size: clamp(1.5rem, 6vw, 3rem);
            }

            section {
                min-height: auto;
                padding: 3rem 1.5rem;
            }

            .hero {
                min-height: 100vh;
            }

            .tracks-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: 1rem;
            }

            .streaming-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .stream-btn {
                font-size: 0.7rem;
            }

            .tower-hero {
                max-width: 350px;
            }

            footer {
                min-height: auto;
                padding: 2rem 1rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.5rem;
            }

            h2 {
                font-size: 1.4rem;
            }

            section {
                padding: 2rem 1rem;
            }

            .tracks-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.8rem;
            }

            .streaming-grid {
                grid-template-columns: 1fr;
            }

            .track-visual {
                padding: 1rem;
            }

            .tower-hero {
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <!-- PARALLAX TOWER BACKGROUND - throughout entire site -->
    <div class="parallax-tower">
        <img src="media/tape cover.jpg" alt="FLAKTAPE Background">
    </div>

    <!-- HERO -->
    <section class="hero">
        <h1 class="hero-title">FLAKTAPE</h1>
        <img src="media/tape cover.jpg" alt="FLAKTAPE" class="tower-hero">
        <p class="hero-subtitle">Out Now</p>
    </section>

    <!-- ABOUT -->
    <section class="gray">
        <div class="tower-section">
            <h2>A Structure<br>Of Sound</h2>
        </div>
    </section>

    <!-- TRACKS -->
    <section class="gray">
        <div style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 3rem;">
            <h2>Tracks</h2>
            <div class="tracks-grid">
                <div class="track-visual">
                    <div class="track-number">01</div>
                    <div class="track-title">Found</div>
                    <div class="track-time">2:34</div>
                </div>
                <div class="track-visual">
                    <div class="track-number">02</div>
                    <div class="track-title">Tower</div>
                    <div class="track-time">4:12</div>
                </div>
                <div class="track-visual">
                    <div class="track-number">03</div>
                    <div class="track-title">Geom</div>
                    <div class="track-time">3:45</div>
                </div>
                <div class="track-visual">
                    <div class="track-number">04</div>
                    <div class="track-title">Sky</div>
                    <div class="track-time">5:28</div>
                </div>
                <div class="track-visual">
                    <div class="track-number">05</div>
                    <div class="track-title">Echo</div>
                    <div class="track-time">4:03</div>
                </div>
                <div class="track-visual">
                    <div class="track-number">06</div>
                    <div class="track-title">End</div>
                    <div class="track-time">3:18</div>
                </div>
            </div>
        </div>
    </section>

    <!-- LISTEN -->
    <section class="dark">
        <div class="tower-section">
            <h2>Listen</h2>
            <div class="streaming-grid">
                <a href="#" class="stream-btn">Spotify</a>
                <a href="#" class="stream-btn">Apple</a>
                <a href="#" class="stream-btn">Sound</a>
                <a href="#" class="stream-btn">YouTube</a>
                <a href="#" class="stream-btn">Bandcamp</a>
                <a href="#" class="stream-btn">Amazon</a>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <h2>Paqay</h2>
        <p style="opacity: 0.6;">2026</p>
        <div>
            <a href="#">Web</a>
            <a href="#">Insta</a>
            <a href="#">Twitter</a>
            <a href="#">Mail</a>
        </div>
    </footer>

    <script>
        // Parallax tower background
        const parallaxTower = document.querySelector('.parallax-tower');
        let towerY = 0;

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            // Parallax at 0.5x speed (moves slower than scroll)
            towerY = scrollY * 0.5;
            parallaxTower.style.transform = `translate(-50%, calc(-50% + ${towerY}px))`;
        });

        // Scroll-triggered animations
        const observerOptions = {
            threshold: 0.2,
            rootMargin: '0px'
        };

        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const delay = entry.target.style.animationDelay || '0s';
                    entry.target.style.opacity = '1';
                    entry.target.style.animationDelay = delay;
                    scrollObserver.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.tower-section h2').forEach(el => {
            scrollObserver.observe(el);
        });

        // Smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        console.log('🎵 FLAKTAPE — Parallax Tower');
    </script>
</body>
</html>
