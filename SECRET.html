  <style>
    :root {
      --bg-blur: 10px;
      --bg-brightness: 1;
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.24);
      --text-primary: #fff;
      --text-secondary: rgba(255, 255, 255, 0.75);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #000;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    .background-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(var(--bg-blur)) brightness(var(--bg-brightness));
      z-index: -1;
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .glass-card {
      width: min(760px, 100%);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 28px;
      backdrop-filter: blur(15px) saturate(180%);
      -webkit-backdrop-filter: blur(15px) saturate(180%);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.42);
      opacity: 0;
      animation: fadeIn 1s ease-in-out 0.2s forwards;
    }

    h1 {
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-size: 28px;
      line-height: 1.2;
      margin-bottom: 12px;
      mix-blend-mode: difference;
      -webkit-mix-blend-mode: difference;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      letter-spacing: 0.4px;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .player-wrap {
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
      background: rgba(0, 0, 0, 0.35);
    }

    .back-link {
      display: inline-flex;
      margin-top: 18px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.82;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .back-link:hover,
    .back-link:focus-visible {
      opacity: 1;
      transform: translateX(-2px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      :root {
        --bg-blur: 8px;
        --bg-brightness: 0.98;
      }

      .glass-card {
        padding: 22px;
      }

      h1 {
        font-size: 24px;
      }
    }

    @media (max-width: 480px) {
      .page {
        padding: 20px 14px;
      }

      .glass-card {
        padding: 18px;
        border-radius: 22px;
      }

      h1 {
        font-size: 20px;
      }

      .subtitle {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <video class="background-video" autoplay muted loop playsinline preload="metadata" aria-hidden="true">
    <source src="media/videos/1020 footage.mp4" type="video/mp4" />
  </video>

  <main class="page">
    <section class="glass-card" aria-labelledby="secret-heading">
      <h1 id="secret-heading">SECRET Session</h1>
      <p class="subtitle">Direkt hören, direkt eintauchen.</p>

      <div class="player-wrap" role="region" aria-label="Eingebetteter SECRET Player">
        <iframe style="border-radius: 24px" src="https://untitled.stream/embed/mjbgQ8RLeWEl" width="100%" height="344" allowFullScreen="" allow="picture-in-picture" frameborder="0" loading="lazy"></iframe>
      </div>

      <a class="back-link" href="/" aria-label="Zurück zur Startseite">← Zurück zur Site</a>
    </section>
  </main>

  <script>
    const iframe = document.querySelector('.player-wrap iframe');
    const media = window.matchMedia('(max-width: 480px)');

    function updateFrameHeight() {
      if (!iframe) return;
      iframe.height = media.matches ? '280' : '344';
    }

    updateFrameHeight();

    if (typeof media.addEventListener === 'function') {
      media.addEventListener('change', updateFrameHeight);
    } else if (typeof media.addListener === 'function') {
      media.addListener(updateFrameHeight);
    }
  </script>
</body>
