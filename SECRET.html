  <style>
    :root {
      --bg-blur: 10px;
      --bg-brightness: 1;
      --card-bg: rgba(12, 12, 14, 0.88);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-primary: #fff;
      --text-secondary: rgba(255, 255, 255, 0.75);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      font-family: Inter, Arial, sans-serif;
      background: transparent;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    .background-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(var(--bg-blur)) brightness(var(--bg-brightness));
      z-index: -1;
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
    }

    .glass-card {
      width: min(980px, 100%);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      padding: 22px;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      box-shadow:
        0 16px 42px rgba(0, 0, 0, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      opacity: 0;
      animation: fadeIn 1s ease-in-out 0.2s forwards;
    }

    h1 {
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 13px;
      max-width: 36ch;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .player-wrap {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      aspect-ratio: 16 / 8.4;
      min-height: 380px;
    }

    .player-wrap iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .back-link {
      display: inline-flex;
      margin-top: 18px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.82;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .back-link:hover,
    .back-link:focus-visible {
      opacity: 1;
      transform: translateX(-2px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      :root {
        --bg-blur: 8px;
        --bg-brightness: 0.98;
      }

      .glass-card {
        padding: 18px;
        border-radius: 16px;
      }

      .player-wrap {
        min-height: 320px;
      }
    }

    @media (max-width: 480px) {
      .page {
        padding: 20px 14px;
      }

      .glass-card {
        padding: 16px;
        border-radius: 14px;
      }

      .player-wrap {
        min-height: 280px;
      }

      .subtitle {
        font-size: 12px;
      }
    }
  </style>
