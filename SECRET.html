  <style>
    :root {
      --bg-blur: 10px;
      --bg-brightness: 1;
      --card-bg: rgba(13, 13, 16, 0.52);
      --card-border: rgba(255, 255, 255, 0.16);
      --accent: #f4b86a;
      --text-primary: #fff;
      --text-secondary: rgba(255, 255, 255, 0.75);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      font-family: Inter, Arial, sans-serif;
      background: #000;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      background:
        radial-gradient(circle at top left, rgba(244, 184, 106, 0.16), transparent 34%),
        radial-gradient(circle at bottom right, rgba(126, 87, 194, 0.15), transparent 30%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.7));
      mix-blend-mode: screen;
    }

    body::after {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 72px 72px;
      opacity: 0.12;
      mask-image: radial-gradient(circle at center, black 42%, transparent 100%);
    }

    .background-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(var(--bg-blur)) brightness(var(--bg-brightness));
      z-index: -1;
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 20px;
    }

    .glass-card {
      width: min(920px, 100%);
      background: linear-gradient(180deg, rgba(24, 24, 28, 0.72), rgba(8, 8, 10, 0.56));
      border: 1px solid var(--card-border);
      border-radius: 32px;
      padding: 30px;
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      opacity: 0;
      animation: fadeIn 1s ease-in-out 0.2s forwards;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-secondary);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 14px rgba(244, 184, 106, 0.7);
    }

    h1 {
      max-width: 10ch;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 0.95;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 15px;
      letter-spacing: 0.02em;
      max-width: 42ch;
      margin-bottom: 0;
      line-height: 1.5;
    }

    .status-copy {
      text-align: right;
      max-width: 220px;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.5;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .player-wrap {
      width: 100%;
      border-radius: 26px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.38);
      box-shadow:
        0 12px 32px rgba(0, 0, 0, 0.38),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      aspect-ratio: 16 / 9;
    }

    .player-wrap iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .player-caption {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 2px 0;
      color: var(--text-secondary);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .player-caption span:last-child {
      color: rgba(255, 255, 255, 0.95);
    }

    .back-link {
      display: inline-flex;
      margin-top: 18px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.82;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .back-link:hover,
    .back-link:focus-visible {
      opacity: 1;
      transform: translateX(-2px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .card-top {
        flex-direction: column;
      }

      .status-copy {
        text-align: left;
        max-width: none;
      }
    }

    @media (max-width: 768px) {
      :root {
        --bg-blur: 8px;
        --bg-brightness: 0.98;
      }

      .glass-card {
        padding: 22px;
        border-radius: 26px;
      }

      .player-caption {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 480px) {
      .page {
        padding: 20px 14px;
      }

      .glass-card {
        padding: 18px;
        border-radius: 22px;
      }

      .eyebrow {
        font-size: 10px;
      }

      .subtitle {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <video class="background-video" autoplay muted loop playsinline preload="metadata" aria-hidden="true">
    <source src="media/videos/1020 footage.mp4" type="video/mp4" />

  <main class="page">
    <section class="glass-card" aria-labelledby="secret-heading">
      <div class="card-top">
        <div>
          <div class="eyebrow">Private listening room</div>
          <h1 id="secret-heading">SECRET Session</h1>
          <p class="subtitle">Direkt hören, direkt eintauchen. Eine dichte, reduzierte Bühne für den Track.</p>
        </div>
        <p class="status-copy">Immersive playback<br />Best experienced full screen</p>
      </div>

      <div class="player-wrap" role="region" aria-label="Eingebetteter SECRET Player">
        <iframe src="https://untitled.stream/embed/mjbgQ8RLeWEl" allowfullscreen allow="picture-in-picture" loading="lazy"></iframe>
      </div>

      <div class="player-caption" aria-hidden="true">
        <span>Now playing</span>
        <span>SECRET Session</span>
      </div>

      <a class="back-link" href="/" aria-label="Zurück zur Startseite">← Zurück zur Site</a>
    </section>
  </main>

</body>
